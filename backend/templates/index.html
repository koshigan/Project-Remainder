<!DOCTYPE html>
<html>
<head>
    <title>Register Form</title>
    <style>
        body {
            background-color: #e6f2ff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 1000vh;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 100px gray;
        }

        h2 {
            text-align: center;
            color: #0066cc;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            padding: 10px;
            border: none;
            cursor: pointer;
        }

        .register-btn {
            width: 100%;
            background-color: #0066cc;
            color: white;
            border-radius: 5px;
        }

        .show-btn {
            background-color: #0066cc;
            color: white;
            border-radius: 5px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Register</h2>

    <form>
        <input type="text" placeholder="Username" required>

        <input type="password" id="password" placeholder="Password" required>

        <button type="button" class="show-btn" onclick="togglePassword()">
            Show Password
        </button>

        <br><br>

        <button type="submit" class="register-btn">
            Register
        </button>
    </form>
</div>

<script>
function togglePassword() {
    let password = document.getElementById("password");

    if (password.type === "password") {
        password.type = "text";
    } else {
        password.type = "password";
    }
}
</script>

</body>
</html>
